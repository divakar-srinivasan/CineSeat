<section class="seat-section-card" aria-labelledby="vip-seats">
  <div class="seat-section-header">
    <h3 id="vip-seats">VIP</h3>
    <span class="pill">&#8377;350 / seat</span>
  </div>
  <div class="seat-grid" role="grid" aria-label="VIP seats">
    <div class="seat-row" role="row">
      <span class="row-label">A</span>
      <button class="seat vip" type="button">A1</button>
      <button class="seat vip" type="button">A2</button>
      <button class="seat vip" type="button">A3</button>
      <button class="seat vip" type="button">A4</button>
      <button class="seat booked" type="button" disabled>A5</button>
      <button class="seat vip" type="button">A6</button>
      <button class="seat vip" type="button">A7</button>
      <button class="seat locked" type="button" disabled>A8</button>
    </div>
  </div>
</section>
